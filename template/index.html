<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YA DA Template</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #0d0d0d;
    font-family: 'Lilita One', cursive;
  }

  .wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
    gap: 20px;
  }

  .hint {
    color: rgba(255,255,255,0.35);
    font-size: 12px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
  }

  /* ===== CARD ===== */
  .card {
    width: 390px;
    height: 692px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 0 6px #FFD600, 0 0 0 10px #FF2E2E, 0 20px 60px rgba(0,0,0,0.8);
  }

  /* Polka dot texture overlay */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
    background-size: 18px 18px;
    z-index: 1;
    pointer-events: none;
  }

  .top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    background: #FF2E2E;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px 20px 48px;
    gap: 10px;
    z-index: 2;
  }

  .bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 50%;
    background: #29B6F6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 20px 16px;
    gap: 10px;
    z-index: 2;
  }

  /* Zigzag divider */
  .zigzag {
    position: absolute;
    top: calc(50% - 12px);
    left: 0; right: 0;
    height: 24px;
    z-index: 3;
    overflow: hidden;
    pointer-events: none;
  }

  .zigzag svg { display: block; }

  /* ===== IMAGE BOX ===== */
  .thumb {
    width: 150px;
    height: 150px;
    border-radius: 0;
    border: 5px solid #FFD600;
    background: rgba(255,255,255,0.15);
    overflow: hidden;
    box-shadow: 6px 6px 0px rgba(0,0,0,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.15s;
    position: relative;
  }

  .thumb:hover { transform: scale(1.05) rotate(-1deg); }

  .thumb .ph {
    font-size: 12px;
    font-family: 'Nunito', sans-serif;
    color: rgba(255,255,255,0.85);
    text-align: center;
    padding: 8px;
    line-height: 1.6;
    font-weight: 900;
    pointer-events: none;
  }

  .thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: none;
  }

  /* ===== TEXT ===== */
  .option-text {
    color: white;
    font-family: 'Lilita One', cursive;
    font-size: 22px;
    text-align: center;
    line-height: 1.2;
    letter-spacing: 0.5px;
    max-width: 310px;
    outline: none;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background 0.2s;
    cursor: text;
    word-break: break-word;
    min-height: 28px;
    /* Bold stroke effect */
    -webkit-text-stroke: 1.5px rgba(0,0,0,0.3);
    text-shadow:
      3px 3px 0 rgba(0,0,0,0.25),
      -1px -1px 0 rgba(0,0,0,0.1);
  }

  .option-text:hover { background: rgba(255,255,255,0.15); }
  .option-text:focus {
    background: rgba(255,255,255,0.2);
    box-shadow: 0 0 0 3px #FFD600;
  }

  /* ===== YA DA BADGE ===== */
  .badge {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    background: #111;
    color: #FFD600;
    font-family: 'Lilita One', cursive;
    font-size: 24px;
    letter-spacing: 3px;
    padding: 14px 36px;
    border-radius: 50px;
    border: 5px solid #FFD600;
    box-shadow:
      0 0 0 3px #111,
      0 6px 24px rgba(0,0,0,0.6),
      0 0 30px rgba(255,214,0,0.3);
    text-transform: uppercase;
    white-space: nowrap;
    user-select: none;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 3px #111, 0 6px 24px rgba(0,0,0,0.6), 0 0 20px rgba(255,214,0,0.2); }
    50% { box-shadow: 0 0 0 3px #111, 0 6px 24px rgba(0,0,0,0.6), 0 0 40px rgba(255,214,0,0.5); }
  }

  /* ===== STARS decoration ===== */
  .star {
    position: absolute;
    font-size: 22px;
    z-index: 4;
    pointer-events: none;
    animation: spin 4s linear infinite;
    opacity: 0.9;
  }

  @keyframes spin {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.2); }
    100% { transform: rotate(360deg) scale(1); }
  }

  .s1 { top: 18px; left: 16px; animation-duration: 3s; }
  .s2 { top: 18px; right: 16px; animation-duration: 5s; animation-direction: reverse; }
  .s3 { top: 55px; left: 50px; font-size: 14px; animation-duration: 4s; }
  .s4 { bottom: 18px; left: 16px; animation-duration: 3.5s; animation-direction: reverse; }
  .s5 { bottom: 18px; right: 16px; animation-duration: 4.5s; }
  .s6 { bottom: 55px; right: 50px; font-size: 14px; animation-duration: 2.5s; }

  /* ===== USERNAME ===== */
  .username {
    position: absolute;
    bottom: 14px;
    right: 16px;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 1px;
    z-index: 6;
    outline: none;
    border-radius: 6px;
    padding: 2px 6px;
    transition: background 0.2s;
    cursor: text;
    min-width: 20px;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
    background: rgba(0,0,0,0.25);
  }

  .username:hover { background: rgba(0,0,0,0.4); }
  .username:focus { background: rgba(0,0,0,0.4); box-shadow: 0 0 0 2px #FFD600; }

  /* ===== CONTROLS ===== */
  .controls {
    width: 390px;
    background: #1a1a1a;
    border-radius: 20px;
    padding: 18px 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    border: 2px solid #2a2a2a;
  }

  .controls-title {
    color: rgba(255,255,255,0.4);
    font-family: 'Nunito', sans-serif;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .color-row { display: flex; gap: 10px; }

  .color-item {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    background: #252525;
    border-radius: 12px;
    padding: 8px 12px;
  }

  .color-item label {
    color: #aaa;
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 700;
    flex: 1;
  }

  input[type="color"] {
    width: 36px; height: 32px;
    border: none; border-radius: 8px;
    cursor: pointer; background: none; padding: 2px;
  }

  .download-btn {
    width: 100%;
    background: linear-gradient(135deg, #FFD600 0%, #FF8C00 100%);
    color: #111;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 16px;
    font-family: 'Lilita One', cursive;
    letter-spacing: 1px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    text-transform: uppercase;
    box-shadow: 0 4px 0 rgba(0,0,0,0.3);
  }

  .download-btn:hover { opacity: 0.9; transform: translateY(-2px); }
  .download-btn:active { transform: translateY(2px); box-shadow: none; }
  .download-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
</style>
</head>
<body>
<div class="wrapper">

  <div class="hint">✏️ Karta tıklayarak metni düzenleyebilirsin</div>

  <div class="card" id="card">

    <!-- Stars -->
    <div class="star s1">⭐</div>
    <div class="star s2">🌟</div>
    <div class="star s3">✨</div>
    <div class="star s4">🌟</div>
    <div class="star s5">⭐</div>
    <div class="star s6">✨</div>

    <div class="top" id="topHalf">
      <div class="thumb" onclick="uploadImg('top')">
        <div class="ph">📷<br>Fotoğraf ekle</div>
        <img id="imgTop" src="" alt="">
      </div>
      <div class="option-text" contenteditable="true" spellcheck="false" id="textTop">1 hafta boyunca saçlarını hiç tarama</div>
    </div>

    <!-- Zigzag line -->
    <div class="zigzag">
      <svg viewBox="0 0 390 24" width="390" height="24" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <polyline points="0,0 20,24 40,0 60,24 80,0 100,24 120,0 140,24 160,0 180,24 200,0 220,24 240,0 260,24 280,0 300,24 320,0 340,24 360,0 380,24 390,12" fill="none" stroke="#FFD600" stroke-width="4"/>
      </svg>
    </div>

    <div class="badge">YA DA</div>

    <div class="bottom" id="bottomHalf">
      <div class="option-text" contenteditable="true" spellcheck="false" id="textBottom">Videoyu beğen ve abone ol</div>
      <div class="thumb" onclick="uploadImg('bot')">
        <div class="ph">📷<br>Fotoğraf ekle</div>
        <img id="imgBot" src="" alt="">
      </div>
    </div>

    <div class="username" contenteditable="true" spellcheck="false" id="usernameEl">@kullaniciadi</div>
  </div>

  <div class="controls">
    <div class="controls-title">🎨 Renk seç</div>
    <div class="color-row">
      <div class="color-item">
        <label>Üst renk</label>
        <input type="color" id="colorTop" value="#FF2E2E" oninput="updateColors()">
      </div>
      <div class="color-item">
        <label>Alt renk</label>
        <input type="color" id="colorBot" value="#29B6F6" oninput="updateColors()">
      </div>
    </div>
    <button class="download-btn" id="dlBtn" onclick="downloadCard()">⬇ PNG olarak indir</button>
  </div>

</div>

<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(event)">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  let currentTarget = null;

  function updateColors() {
    document.getElementById('topHalf').style.background = document.getElementById('colorTop').value;
    document.getElementById('bottomHalf').style.background = document.getElementById('colorBot').value;
  }

  function uploadImg(target) {
    currentTarget = target;
    document.getElementById('fileInput').click();
  }

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const imgEl = document.getElementById(currentTarget === 'top' ? 'imgTop' : 'imgBot');
      const ph = imgEl.previousElementSibling;
      imgEl.src = ev.target.result;
      imgEl.style.display = 'block';
      if (ph) ph.style.display = 'none';
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  }

  async function downloadCard() {
    document.activeElement.blur();

    // Hide animated stars for clean export
    document.querySelectorAll('.star').forEach(s => s.style.display = 'none');
    const editables = document.querySelectorAll('[contenteditable="true"]');
    editables.forEach(el => el.setAttribute('contenteditable', 'false'));

    const btn = document.getElementById('dlBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Hazırlanıyor...';

    await new Promise(r => setTimeout(r, 120));

    try {
      const card = document.getElementById('card');
      const canvas = await html2canvas(card, {
        scale: 3,
        useCORS: true,
        allowTaint: true,
        backgroundColor: null,
        logging: false,
        foreignObjectRendering: false
      });
      const link = document.createElement('a');
      link.download = 'yada_template.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch (err) {
      console.error(err);
      alert('İndirme sırasında bir hata oluştu.');
    }

    document.querySelectorAll('.star').forEach(s => s.style.display = '');
    editables.forEach(el => el.setAttribute('contenteditable', 'true'));
    btn.disabled = false;
    btn.textContent = '⬇ PNG olarak indir';
  }

  document.getElementById('usernameEl').addEventListener('keydown', e => {
    if (e.key === 'Enter') e.preventDefault();
  });
</script>
</body>
</html>
