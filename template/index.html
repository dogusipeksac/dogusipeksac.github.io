<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YA DA Template</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #111;
    font-family: 'Nunito', sans-serif;
  }

  .wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
    gap: 20px;
  }

  .hint {
    color: rgba(255,255,255,0.35);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
  }

  .card {
    width: 390px;
    height: 692px;
    position: relative;
    
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7);
  }

  .top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    background: #FF2E2E;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 24px 44px;
    gap: 12px;
  }

  .bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 50%;
    background: #29B6F6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 44px 24px 20px;
    gap: 12px;
  }

  /* BIGGER + NO CORNER RADIUS */
  .thumb {
    width: 140px;
    height: 140px;
    border-radius: 0;
    border: 4px solid white;
    background: rgba(255,255,255,0.2);
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.15s;
  }

  .thumb:hover { transform: scale(1.04); }

  .thumb .ph {
    font-size: 11px;
    color: rgba(255,255,255,0.8);
    text-align: center;
    padding: 8px;
    line-height: 1.6;
    font-weight: 900;
    pointer-events: none;
  }

  .thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: none;
  }

  .option-text {
    color: white;
    font-size: 19px;
    font-weight: 900;
    text-align: center;
    line-height: 1.25;
    text-shadow: 0 2px 8px rgba(0,0,0,0.15);
    max-width: 300px;
    outline: none;
    border-radius: 8px;
    padding: 4px 8px;
    transition: background 0.2s;
    cursor: text;
    word-break: break-word;
    min-height: 28px;
  }

  .option-text:hover { background: rgba(255,255,255,0.15); }
  .option-text:focus {
    background: rgba(255,255,255,0.2);
    box-shadow: 0 0 0 2px white;
  }

  .badge {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    background: #111;
    color: white;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 2.5px;
    padding: 13px 32px;
    border-radius: 50px;
    border: 4px solid white;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    text-transform: uppercase;
    white-space: nowrap;
    user-select: none;
  }

  .username {
    position: absolute;
    bottom: 14px;
    right: 18px;
    color: rgba(255,255,255,0.9);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 1px;
    z-index: 5;
    outline: none;
    border-radius: 6px;
    padding: 2px 6px;
    transition: background 0.2s;
    cursor: text;
    min-width: 20px;
  }

  .username:hover { background: rgba(255,255,255,0.15); }
  .username:focus { background: rgba(255,255,255,0.2); box-shadow: 0 0 0 2px white; }

  .controls {
    width: 390px;
    background: #1e1e1e;
    border-radius: 20px;
    padding: 18px 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .controls-title {
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .color-row {
    display: flex;
    gap: 10px;
  }

  .color-item {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    background: #2a2a2a;
    border-radius: 12px;
    padding: 8px 12px;
  }

  .color-item label {
    color: #aaa;
    font-size: 12px;
    font-weight: 700;
    flex: 1;
  }

  input[type="color"] {
    width: 36px;
    height: 32px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: none;
    padding: 2px;
  }

  .download-btn {
    width: 100%;
    background: linear-gradient(135deg, #FF2E2E 0%, #FF6B35 100%);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 1px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: opacity 0.2s, transform 0.1s;
    text-transform: uppercase;
  }

  .download-btn:hover { opacity: 0.88; transform: scale(1.01); }
  .download-btn:active { transform: scale(0.98); }
  .download-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
</style>
</head>
<body>
<div class="wrapper">

  <div class="hint">✏️ Karta tıklayarak metni doğrudan düzenleyebilirsin</div>

  <div class="card" id="card">
    <div class="top" id="topHalf">
      <div class="thumb" onclick="uploadImg('top')">
        <div class="ph">📷<br>Fotoğraf ekle</div>
        <img id="imgTop" src="" alt="">
      </div>
      <div class="option-text" contenteditable="true" spellcheck="false" id="textTop">1 hafta boyunca saçlarını hiç tarama</div>
    </div>

    <div class="badge">YA DA</div>

    <div class="bottom" id="bottomHalf">
      <div class="option-text" contenteditable="true" spellcheck="false" id="textBottom">Videoyu beğen ve abone ol</div>
      <div class="thumb" onclick="uploadImg('bot')">
        <div class="ph">📷<br>Fotoğraf ekle</div>
        <img id="imgBot" src="" alt="">
      </div>
    </div>

    <div class="username" contenteditable="true" spellcheck="false" id="usernameEl">@kullaniciadi</div>
  </div>

  <div class="controls">
    <div class="controls-title">🎨 Renk seç</div>
    <div class="color-row">
      <div class="color-item">
        <label>Üst renk</label>
        <input type="color" id="colorTop" value="#FF2E2E" oninput="updateColors()">
      </div>
      <div class="color-item">
        <label>Alt renk</label>
        <input type="color" id="colorBot" value="#29B6F6" oninput="updateColors()">
      </div>
    </div>
    <button class="download-btn" id="dlBtn" onclick="downloadCard()">⬇ PNG olarak indir</button>
  </div>

</div>

<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(event)">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  let currentTarget = null;

  function updateColors() {
    document.getElementById('topHalf').style.background = document.getElementById('colorTop').value;
    document.getElementById('bottomHalf').style.background = document.getElementById('colorBot').value;
  }

  function uploadImg(target) {
    currentTarget = target;
    document.getElementById('fileInput').click();
  }

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const imgEl = document.getElementById(currentTarget === 'top' ? 'imgTop' : 'imgBot');
      const ph = imgEl.previousElementSibling;
      imgEl.src = ev.target.result;
      imgEl.style.display = 'block';
      if (ph) ph.style.display = 'none';
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  }

  async function downloadCard() {
    document.activeElement.blur();
    const editables = document.querySelectorAll('[contenteditable="true"]');
    editables.forEach(el => el.setAttribute('contenteditable', 'false'));

    const btn = document.getElementById('dlBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Hazırlanıyor...';

    await new Promise(r => setTimeout(r, 100));

    try {
      const card = document.getElementById('card');
      const canvas = await html2canvas(card, {
        scale: 3,
        useCORS: true,
        allowTaint: true,
        backgroundColor: null,
        logging: false,
        foreignObjectRendering: false
      });
      const link = document.createElement('a');
      link.download = 'yada_template.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch (err) {
      console.error(err);
      alert('İndirme sırasında bir hata oluştu.');
    }

    editables.forEach(el => el.setAttribute('contenteditable', 'true'));
    btn.disabled = false;
    btn.textContent = '⬇ PNG olarak indir';
  }

  document.getElementById('usernameEl').addEventListener('keydown', e => {
    if (e.key === 'Enter') e.preventDefault();
  });
</script>
</body>
</html>
