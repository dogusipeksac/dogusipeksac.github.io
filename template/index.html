<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YA DA Template</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a1a;
    font-family: 'Nunito', sans-serif;
  }

  .card {
    width: 390px;
    height: 692px;
    position: relative;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7);
  }

  /* TOP HALF */
  .top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    background: #FF2E2E;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 24px 40px;
    gap: 16px;
  }

  /* BOTTOM HALF */
  .bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 50%;
    background: #29B6F6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px 28px;
    gap: 16px;
  }

  /* THUMBNAIL IMAGE BOX */
  .thumb {
    width: 100px;
    height: 100px;
    border-radius: 16px;
    border: 4px solid white;
    background: rgba(255,255,255,0.25);
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.6);
    font-size: 11px;
    text-align: center;
    font-weight: 900;
    letter-spacing: 0.5px;
    cursor: pointer;
    position: relative;
  }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }

  .thumb .placeholder-text {
    font-size: 10px;
    color: rgba(255,255,255,0.7);
    text-align: center;
    padding: 8px;
    line-height: 1.4;
  }

  /* OPTION TEXT */
  .option-text {
    color: white;
    font-size: 22px;
    font-weight: 900;
    text-align: center;
    line-height: 1.25;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    letter-spacing: -0.3px;
    max-width: 300px;
  }

  /* YA DA BADGE */
  .badge {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    background: #111;
    color: white;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 2px;
    padding: 14px 34px;
    border-radius: 50px;
    border: 4px solid white;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    text-transform: uppercase;
    white-space: nowrap;
    user-select: none;
  }

  /* USERNAME */
  .username {
    position: absolute;
    bottom: 14px;
    right: 18px;
    color: rgba(255,255,255,0.85);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 1px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    z-index: 5;
  }

  /* EDITABLE CONTROLS */
  .controls {
    margin-top: 28px;
    width: 390px;
    background: #2a2a2a;
    border-radius: 20px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .controls h3 {
    color: #fff;
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
    opacity: 0.6;
  }

  .ctrl-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .ctrl-row label {
    color: #aaa;
    font-size: 12px;
    font-weight: 700;
    width: 70px;
    flex-shrink: 0;
  }

  .ctrl-row input[type="text"] {
    flex: 1;
    background: #3a3a3a;
    border: none;
    border-radius: 10px;
    color: white;
    padding: 9px 12px;
    font-size: 13px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    outline: none;
  }

  .ctrl-row input[type="text"]:focus {
    background: #444;
    box-shadow: 0 0 0 2px #FF2E2E;
  }

  .ctrl-row input[type="color"] {
    width: 40px;
    height: 36px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: none;
    padding: 2px;
  }

  .download-btn {
    margin-top: 6px;
    width: 100%;
    background: linear-gradient(135deg, #FF2E2E, #FF7043);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 1px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: opacity 0.2s;
    text-transform: uppercase;
  }

  .download-btn:hover { opacity: 0.85; }

  .divider {
    width: 100%;
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 4px 0;
  }
</style>
</head>
<body>

<div style="display:flex; flex-direction:column; align-items:center; padding: 32px 16px;">

  <!-- CARD -->
  <div class="card" id="card">
    <div class="top" id="topHalf">
      <div class="thumb" id="thumbTop" onclick="uploadImg('top')">
        <div class="placeholder-text">📷<br>Fotoğraf<br>ekle</div>
        <img id="imgTop" src="" alt="">
      </div>
      <div class="option-text" id="textTop">1 hafta boyunca saçlarını hiç tarama</div>
    </div>

    <div class="badge">YA DA</div>

    <div class="bottom" id="bottomHalf">
      <div class="option-text" id="textBottom">Videoyu beğen ve abone ol</div>
      <div class="thumb" id="thumbBot" onclick="uploadImg('bot')">
        <div class="placeholder-text">📷<br>Fotoğraf<br>ekle</div>
        <img id="imgBot" src="" alt="">
      </div>
    </div>

    <div class="username" id="usernameEl">@kullaniciadi</div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <h3>✏️ Düzenle</h3>

    <div class="ctrl-row">
      <label>Üst metin</label>
      <input type="text" id="inTop" value="1 hafta boyunca saçlarını hiç tarama" oninput="updateText()">
    </div>
    <div class="ctrl-row">
      <label>Alt metin</label>
      <input type="text" id="inBot" value="Videoyu beğen ve abone ol" oninput="updateText()">
    </div>

    <div class="divider"></div>

    <div class="ctrl-row">
      <label>Kullanıcı adı</label>
      <input type="text" id="inUser" value="@kullaniciadi" oninput="updateText()">
    </div>

    <div class="divider"></div>

    <div class="ctrl-row">
      <label>Üst renk</label>
      <input type="color" id="colorTop" value="#FF2E2E" oninput="updateColors()">
      <label style="width:auto; margin-left:16px;">Alt renk</label>
      <input type="color" id="colorBot" value="#29B6F6" oninput="updateColors()">
    </div>

    <button class="download-btn" onclick="downloadCard()">⬇ PNG olarak indir</button>
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(event)">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  let currentTarget = null;

  function updateText() {
    document.getElementById('textTop').textContent = document.getElementById('inTop').value;
    document.getElementById('textBottom').textContent = document.getElementById('inBot').value;
    document.getElementById('usernameEl').textContent = document.getElementById('inUser').value;
  }

  function updateColors() {
    document.getElementById('topHalf').style.background = document.getElementById('colorTop').value;
    document.getElementById('bottomHalf').style.background = document.getElementById('colorBot').value;
  }

  function uploadImg(target) {
    currentTarget = target;
    document.getElementById('fileInput').click();
  }

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const imgEl = currentTarget === 'top' ? document.getElementById('imgTop') : document.getElementById('imgBot');
      const placeholder = imgEl.previousElementSibling;
      imgEl.src = ev.target.result;
      imgEl.style.display = 'block';
      if (placeholder) placeholder.style.display = 'none';
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  }

  async function downloadCard() {
    const card = document.getElementById('card');
    const btn = document.querySelector('.download-btn');
    btn.textContent = '⏳ Hazırlanıyor...';
    try {
      const canvas = await html2canvas(card, {
        scale: 3,
        useCORS: true,
        backgroundColor: null,
        logging: false
      });
      const link = document.createElement('a');
      link.download = 'yada_template.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch(err) {
      alert('İndirme sırasında hata oluştu.');
    }
    btn.textContent = '⬇ PNG olarak indir';
  }
</script>
</body>
</html>
