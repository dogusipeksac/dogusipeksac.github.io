<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YA DA Template</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@800;900&family=Nunito:wght@800;900&family=Fredoka:wght@600;700&family=Grandstander:wght@800;900&family=Comfortaa:wght@700&family=Quicksand:wght@700&family=Ubuntu:wght@700&family=Exo+2:wght@800;900&family=Poppins:wght@800;900&family=Raleway:wght@800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #0a0a0a;
    font-family: 'Nunito', sans-serif;
  }

  .wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
    gap: 20px;
  }

  .hint {
    color: rgba(255,255,255,0.3);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    text-align: center;
  }

  /* ===== CARD ===== */
  .card {
    width: 390px;
    height: 692px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 0 5px #FFD600, 0 0 0 9px #FF2E2E, 0 24px 70px rgba(0,0,0,0.85);
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 18px 18px;
    z-index: 1;
    pointer-events: none;
  }

  .top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 55%;
    background: #FF2E2E;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    z-index: 2;
  }

  .bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 50%;
    background: #29B6F6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    z-index: 2;
  }

  .zigzag {
    position: absolute;
    top: calc(50% - 12px);
    left: 0; right: 0;
    height: 24px;
    z-index: 3;
    pointer-events: none;
  }
  .zigzag svg { display: block; }

  /* IMAGE */
  .thumb {
    width: 170px;
    height: 170px;
    border: 5px solid #FFD600;
    background: rgba(255,255,255,0.15);
    overflow: hidden;
    box-shadow: 6px 6px 0 rgba(0,0,0,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.15s;
  }
  .thumb:hover { transform: scale(1.05) rotate(-1deg); }
  .thumb .ph {
    font-size: 12px;
    color: rgba(255,255,255,0.85);
    text-align: center;
    padding: 8px;
    line-height: 1.6;
    font-weight: 800;
    pointer-events: none;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: none; }

  /* TEXT */
  .option-text {
    color: white;
    font-family: 'Baloo 2', cursive;
    font-size: 22px;
    text-align: center;
    line-height: 1.2;
    max-width: 310px;
    outline: none;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background 0.2s;
    cursor: text;
    word-break: break-word;
    min-height: 28px;
    -webkit-text-stroke: 1.5px rgba(0,0,0,0.3);
    text-shadow: 3px 3px 0 rgba(0,0,0,0.25), -1px -1px 0 rgba(0,0,0,0.1);
  }
  .option-text:hover { background: rgba(255,255,255,0.15); }
  .option-text:focus { background: rgba(255,255,255,0.2); box-shadow: 0 0 0 3px #FFD600; }

  /* BADGE */
  .badge {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    background: #111;
    color: #FFD600;
    font-family: 'Baloo 2', cursive;
    font-size: 24px;
    letter-spacing: 3px;
    padding: 14px 36px;
    border-radius: 50px;
    border: 5px solid #FFD600;
    box-shadow: 0 0 0 3px #111, 0 6px 24px rgba(0,0,0,0.6), 0 0 30px rgba(255,214,0,0.3);
    text-transform: uppercase;
    white-space: nowrap;
    user-select: none;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 3px #111, 0 6px 24px rgba(0,0,0,0.6), 0 0 20px rgba(255,214,0,0.2); }
    50%      { box-shadow: 0 0 0 3px #111, 0 6px 24px rgba(0,0,0,0.6), 0 0 44px rgba(255,214,0,0.55); }
  }

  /* STARS */
  .star { position: absolute; font-size: 22px; z-index: 4; pointer-events: none; animation: spin 4s linear infinite; opacity: 0.9; }
  @keyframes spin {
    0%   { transform: rotate(0deg) scale(1); }
    50%  { transform: rotate(180deg) scale(1.2); }
    100% { transform: rotate(360deg) scale(1); }
  }
  .s1 { top: 18px; left: 16px; animation-duration: 3s; }
  .s2 { top: 18px; right: 16px; animation-duration: 5s; animation-direction: reverse; }
  .s3 { top: 55px; left: 50px; font-size: 14px; animation-duration: 4s; }
  .s4 { bottom: 18px; left: 16px; animation-duration: 3.5s; animation-direction: reverse; }
  .s5 { bottom: 18px; right: 16px; animation-duration: 4.5s; }
  .s6 { bottom: 55px; right: 50px; font-size: 14px; animation-duration: 2.5s; }

  /* USERNAME */
  .username {
  position: absolute;
   top: 58%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: rgba(255,255,255,0.7);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.5px;
  z-index: 11;
  outline: none;
  border-radius: 6px;
  padding: 4px 10px;
  transition: background 0.2s;
  cursor: text;
  min-width: 20px;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
  background: rgba(0,0,0,0.3);
}
  .username:hover { background: rgba(0,0,0,0.4); }
  .username:focus { background: rgba(0,0,0,0.4); box-shadow: 0 0 0 2px #FFD600; }

  /* ===== CONTROLS ===== */
  .controls {
    width: 390px;
    background: #161616;
    border-radius: 20px;
    padding: 18px 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    border: 1.5px solid #242424;
  }

  .section-label {
    color: rgba(255,255,255,0.35);
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: -4px;
  }

  /* FONT GRID */
  .font-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }

  .font-btn {
    background: #1e1e1e;
    border: 2px solid #2e2e2e;
    border-radius: 10px;
    color: white;
    padding: 10px 8px;
    font-size: 15px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    line-height: 1.1;
  }
  .font-btn span { display: block; font-size: 9px; opacity: 0.45; margin-top: 2px; font-family: 'Nunito', sans-serif; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }
  .font-btn:hover { background: #282828; border-color: #FFD600; }
  .font-btn.active { background: #1f1a00; border-color: #FFD600; color: #FFD600; }

  /* COLORS */
  .color-row { display: flex; gap: 10px; }
  .color-item {
    display: flex; align-items: center; gap: 8px; flex: 1;
    background: #1e1e1e; border-radius: 12px; padding: 9px 12px;
  }
  .color-item label { color: #888; font-size: 12px; font-weight: 800; flex: 1; }
  input[type="color"] {
    width: 36px; height: 32px;
    border: none; border-radius: 8px;
    cursor: pointer; background: none; padding: 2px;
  }

  /* BUTTON ROW */
  .btn-row {
    display: flex;
    gap: 10px;
  }

  /* DOWNLOAD BUTTON */
  .download-btn {
    flex: 1;
    position: relative;
    background: linear-gradient(135deg, #FFD600 0%, #FF9500 50%, #FF5E00 100%);
    color: #111;
    border: none;
    border-radius: 16px;
    padding: 0;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 6px 0 #9a5800, 0 8px 20px rgba(255, 150, 0, 0.4);
    overflow: hidden;
  }
  .download-btn:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #9a5800, 0 12px 28px rgba(255,150,0,0.5); }
  .download-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #9a5800, 0 4px 10px rgba(255,150,0,0.3); }
  .download-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }

  .download-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    animation: shimmer 2.5s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%   { left: -100%; }
    60%,100% { left: 150%; }
  }

  /* GIF BUTTON */
  .gif-btn {
    flex: 1;
    position: relative;
    background: linear-gradient(135deg, #a855f7 0%, #7c3aed 50%, #4f46e5 100%);
    color: #fff;
    border: none;
    border-radius: 16px;
    padding: 0;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 6px 0 #2d1b69, 0 8px 20px rgba(139, 92, 246, 0.4);
    overflow: hidden;
  }
  .gif-btn:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #2d1b69, 0 12px 28px rgba(139,92,246,0.5); }
  .gif-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2d1b69, 0 4px 10px rgba(139,92,246,0.3); }
  .gif-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }

  .gif-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    animation: shimmer 2s ease-in-out infinite;
  }

  .download-btn-inner, .gif-btn-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 15px 12px;
    font-family: 'Baloo 2', cursive;
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .dl-icon {
    width: 26px; height: 26px;
    background: rgba(0,0,0,0.15);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  /* GIF PROGRESS */
  .gif-progress {
    display: none;
    flex-direction: column;
    gap: 6px;
  }
  .gif-progress.visible { display: flex; }
  .progress-bar-wrap {
    width: 100%;
    height: 8px;
    background: #2a2a2a;
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #a855f7, #7c3aed);
    border-radius: 99px;
    width: 0%;
    transition: width 0.2s;
  }
  .progress-label {
    color: rgba(255,255,255,0.4);
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
  }
</style>
</head>
<body>
<div class="wrapper">

  <div class="hint">✏️ Karta tıklayarak metni düzenleyebilirsin</div>

  <div class="card" id="card">
    <div class="star s1">⭐</div>
    <div class="star s2">🌟</div>
    <div class="star s3">✨</div>
    <div class="star s4">🌟</div>
    <div class="star s5">⭐</div>
    <div class="star s6">✨</div>

    <div class="top" id="topHalf">
      <div class="thumb" onclick="uploadImg('top')">
        <div class="ph">📷<br>Fotoğraf ekle</div>
        <img id="imgTop" src="" alt="">
      </div>
      <div class="option-text" contenteditable="true" spellcheck="false" id="textTop">1 hafta boyunca saçlarını hiç tarama</div>
    </div>

    <div class="zigzag">
      <svg viewBox="0 0 390 24" width="390" height="24" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <polyline points="0,0 20,24 40,0 60,24 80,0 100,24 120,0 140,24 160,0 180,24 200,0 220,24 240,0 260,24 280,0 300,24 320,0 340,24 360,0 380,24 390,12" fill="none" stroke="#FFD600" stroke-width="4"/>
      </svg>
    </div>

    <div class="badge">YA DA</div>

    <div class="bottom" id="bottomHalf">
      <div class="option-text" contenteditable="true" spellcheck="false" id="textBottom">Videoyu beğen ve abone ol</div>
      <div class="thumb" onclick="uploadImg('bot')">
        <div class="ph">📷<br>Fotoğraf ekle</div>
        <img id="imgBot" src="" alt="">
      </div>
    </div>

    <div class="username" contenteditable="true" spellcheck="false" id="usernameEl">@kullaniciadi</div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">

    <div class="section-label">🔤 Yazı tipi</div>
    <div class="font-grid">
      <button class="font-btn active" style="font-family:'Baloo 2',cursive" onclick="setFont('Baloo 2',this)">
        Baloo 2 — Ğışçöü
        <span>Türkçe ✓ · Eğlenceli</span>
      </button>
      <button class="font-btn" style="font-family:'Fredoka',cursive" onclick="setFont('Fredoka',this)">
        Fredoka — Ğışçöü
        <span>Türkçe ✓ · Yuvarlak</span>
      </button>
      <button class="font-btn" style="font-family:'Grandstander',cursive" onclick="setFont('Grandstander',this)">
        Grandstander — Ğışçöü
        <span>Türkçe ✓ · Karikatür</span>
      </button>
      <button class="font-btn" style="font-family:'Nunito',sans-serif" onclick="setFont('Nunito',this)">
        Nunito — Ğışçöü
        <span>Türkçe ✓ · Soft</span>
      </button>
      <button class="font-btn" style="font-family:'Quicksand',sans-serif" onclick="setFont('Quicksand',this)">
        Quicksand — Ğışçöü
        <span>Türkçe ✓ · Modern</span>
      </button>
      <button class="font-btn" style="font-family:'Comfortaa',cursive" onclick="setFont('Comfortaa',this)">
        Comfortaa — Ğışçöü
        <span>Türkçe ✓ · Minimal</span>
      </button>
      <button class="font-btn" style="font-family:'Exo 2',sans-serif" onclick="setFont('Exo 2',this)">
        Exo 2 — Ğışçöü
        <span>Türkçe ✓ · Sporty</span>
      </button>
      <button class="font-btn" style="font-family:'Poppins',sans-serif" onclick="setFont('Poppins',this)">
        Poppins — Ğışçöü
        <span>Türkçe ✓ · Temiz</span>
      </button>
      <button class="font-btn" style="font-family:'Raleway',sans-serif" onclick="setFont('Raleway',this)">
        Raleway — Ğışçöü
        <span>Türkçe ✓ · Şık</span>
      </button>
      <button class="font-btn" style="font-family:'Ubuntu',sans-serif" onclick="setFont('Ubuntu',this)">
        Ubuntu — Ğışçöü
        <span>Türkçe ✓ · Kalın</span>
      </button>
    </div>

    <div class="section-label">🎨 Renk</div>
    <div class="color-row">
      <div class="color-item">
        <label>Üst renk</label>
        <input type="color" id="colorTop" value="#FF2E2E" oninput="updateColors()">
      </div>
      <div class="color-item">
        <label>Alt renk</label>
        <input type="color" id="colorBot" value="#29B6F6" oninput="updateColors()">
      </div>
    </div>

    <div class="btn-row">
      <button class="download-btn" id="dlBtn" onclick="downloadCard()">
        <div class="download-btn-inner" id="dlBtnInner">
          <div class="dl-icon">⬇</div>
          PNG İndir
        </div>
      </button>

      <button class="gif-btn" id="gifBtn" onclick="downloadGif()">
        <div class="gif-btn-inner" id="gifBtnInner">
          <div class="dl-icon">🎞</div>
          GIF İndir
        </div>
      </button>
    </div>

    <!-- Progress bar (gif only) -->
    <div class="gif-progress" id="gifProgress">
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="progress-label" id="progressLabel">Kareler hazırlanıyor...</div>
    </div>

  </div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(event)">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<script>
  let currentTarget = null;

  function setFont(fontName, btn) {
    document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.option-text').forEach(el => {
      el.style.fontFamily = `'${fontName}', cursive`;
    });
  }

  function updateColors() {
    document.getElementById('topHalf').style.background = document.getElementById('colorTop').value;
    document.getElementById('bottomHalf').style.background = document.getElementById('colorBot').value;
  }

  function uploadImg(target) {
    currentTarget = target;
    document.getElementById('fileInput').click();
  }

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const imgEl = document.getElementById(currentTarget === 'top' ? 'imgTop' : 'imgBot');
      const ph = imgEl.previousElementSibling;
      imgEl.src = ev.target.result;
      imgEl.style.display = 'block';
      if (ph) ph.style.display = 'none';
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  }

  async function downloadCard() {
    document.activeElement.blur();
    document.querySelectorAll('.star').forEach(s => s.style.display = 'none');
    const editables = document.querySelectorAll('[contenteditable="true"]');
    editables.forEach(el => el.setAttribute('contenteditable', 'false'));

    const btn = document.getElementById('dlBtn');
    btn.disabled = true;
    document.getElementById('dlBtnInner').innerHTML = '<div class="dl-icon">⏳</div> Hazırlanıyor...';

    await new Promise(r => setTimeout(r, 150));

    try {
      const card = document.getElementById('card');
      const canvas = await html2canvas(card, {
        scale: 3,
        useCORS: true,
        allowTaint: true,
        backgroundColor: null,
        logging: false,
        foreignObjectRendering: false
      });
      const link = document.createElement('a');
      link.download = 'yada_template.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch (err) {
      console.error(err);
      alert('İndirme sırasında bir hata oluştu.');
    }

    document.querySelectorAll('.star').forEach(s => s.style.display = '');
    editables.forEach(el => el.setAttribute('contenteditable', 'true'));
    btn.disabled = false;
    document.getElementById('dlBtnInner').innerHTML = '<div class="dl-icon">⬇</div> PNG İndir';
  }

  // ============================================================
  // GIF DOWNLOAD
  // ============================================================
  async function downloadGif() {
    document.activeElement.blur();

    const gifBtn   = document.getElementById('gifBtn');
    const dlBtn    = document.getElementById('dlBtn');
    const progress = document.getElementById('gifProgress');
    const fill     = document.getElementById('progressFill');
    const label    = document.getElementById('progressLabel');

    gifBtn.disabled = true;
    dlBtn.disabled  = true;
    document.getElementById('gifBtnInner').innerHTML = '<div class="dl-icon">⏳</div> GIF Yapılıyor...';
    progress.classList.add('visible');

    const editables = document.querySelectorAll('[contenteditable="true"]');
    editables.forEach(el => el.setAttribute('contenteditable', 'false'));

    // --- GIF settings ---
    const FPS       = 10;
    const FRAMES    = 40;
    const DELAY_MS  = Math.round(1000 / FPS);
    const SCALE     = 1.5;    // lower scale = smaller file, still looks good on mobile

    const card = document.getElementById('card');

    // Load worker as blob to avoid CORS issues
    let workerUrl;
    try {
      const res  = await fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');
      const blob = await res.blob();
      workerUrl  = URL.createObjectURL(blob);
    } catch(e) {
      alert('Worker dosyası yüklenemedi. İnternet bağlantınızı kontrol edin.');
      resetGifBtn();
      return;
    }

    const gif = new GIF({
      workers: 2,
      quality: 8,          // 1=best, 20=worst; 8 is a nice balance
      width:  390 * SCALE,
      height: 692 * SCALE,
      workerScript: workerUrl,
      repeat: 0            // loop forever
    });

    // --- Capture frames ---
    for (let i = 0; i < FRAMES; i++) {
      const pct = Math.round((i / FRAMES) * 80);
      fill.style.width  = pct + '%';
      label.textContent = `Kare ${i + 1} / ${FRAMES} çiziliyor...`;

      const start = performance.now();

      let canvas;
      try {
        canvas = await html2canvas(card, {
          scale: SCALE,
          useCORS: true,
          allowTaint: true,
          backgroundColor: null,
          logging: false,
          foreignObjectRendering: false
        });
      } catch(e) {
        console.warn('html2canvas hatası:', e);
        continue;
      }

      gif.addFrame(canvas, { delay: DELAY_MS, copy: true });

      // Wait remainder of the frame interval so animation actually advances
      const elapsed = performance.now() - start;
      const wait    = Math.max(0, DELAY_MS - elapsed);
      await new Promise(r => setTimeout(r, wait));
    }

    label.textContent = 'GIF kodlanıyor, lütfen bekle...';
    fill.style.width  = '85%';

    gif.on('progress', p => {
      fill.style.width = (85 + p * 15) + '%';
    });

    gif.on('finished', blob => {
      fill.style.width  = '100%';
      label.textContent = 'Tamamlandı! İndiriliyor...';

      const link = document.createElement('a');
      link.download = 'yada_animation.gif';
      link.href     = URL.createObjectURL(blob);
      link.click();

      URL.revokeObjectURL(workerUrl);
      setTimeout(resetGifBtn, 1500);
    });

    gif.render();

    // Restore editables now (GIF encoding is async, cards already captured)
    editables.forEach(el => el.setAttribute('contenteditable', 'true'));
  }

  function resetGifBtn() {
    document.getElementById('gifBtn').disabled = false;
    document.getElementById('dlBtn').disabled  = false;
    document.getElementById('gifBtnInner').innerHTML = '<div class="dl-icon">🎞</div> GIF İndir';
    document.getElementById('gifProgress').classList.remove('visible');
    document.getElementById('progressFill').style.width = '0%';
  }

  // Prevent newline in username field
  document.getElementById('usernameEl').addEventListener('keydown', e => {
    if (e.key === 'Enter') e.preventDefault();
  });
</script>
</body>
</html>
